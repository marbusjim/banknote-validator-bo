<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e"/>
      <stop offset="100%" style="stop-color:#3949ab"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Banknote shape -->
  <rect x="96" y="160" width="320" height="192" rx="16" fill="white" opacity="0.95"/>
  <rect x="112" y="176" width="288" height="160" rx="8" fill="none" stroke="#1a237e" stroke-width="4" stroke-dasharray="8,4"/>
  <!-- Center circle (denomination area) -->
  <circle cx="256" cy="256" r="48" fill="#e8eaf6" stroke="#1a237e" stroke-width="3"/>
  <text x="256" y="264" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="32" fill="#1a237e">Bs</text>
  <!-- Checkmark -->
  <circle cx="380" cy="172" r="40" fill="#2e7d32"/>
  <polyline points="360,172 374,186 400,158" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bolivia flag colors (small stripe at bottom) -->
  <rect x="96" y="336" width="320" height="6" rx="3" fill="#d32f2f"/>
  <rect x="96" y="344" width="320" height="6" rx="3" fill="#ffc107"/>
  <rect x="96" y="352" width="320" height="5" rx="3" fill="#388e3c"/>
</svg>
